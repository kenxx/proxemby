name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist/proxemby-linux-amd64
          go build -trimpath -ldflags="-s -w" -o dist/proxemby-linux-amd64/proxemby ./cmd/proxemby
          cp README.md dist/proxemby-linux-amd64/
          tar -C dist -czf dist/proxemby-linux-amd64.tar.gz proxemby-linux-amd64

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/proxemby-linux-amd64.tar.gz
